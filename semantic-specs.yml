# semantic-specs.yml
#
# Spec-generator configuration for ratatoist — a Rust TUI task manager.
# Repo: https://github.com/josephmethod/ratatoist
#
# Add to .gitignore:
#   tmp/semanticsearch/

spec_paths:

  # Path-prefix: one spec per crate
  crates/:
    entry_point_base: crates/
    prompt: semantic-generic-spec-prompt

  # Flat: app-level overview spec
  ratatoist:
    output: specifications/ratatoist.spec.md
    source_dirs:
      - crates/
    prompt: semantic-generic-spec-prompt
